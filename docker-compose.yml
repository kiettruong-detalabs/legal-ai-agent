version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalai2026}
      POSTGRES_DB: ${POSTGRES_DB:-legalai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Database (internal Docker network)
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-legalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalai2026}
      POSTGRES_DB: ${POSTGRES_DB:-legalai}
      DB_PORT: 5432
      DB_SSL_MODE: disable
      # Auth
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-string}
      SUPABASE_JWT_SECRET: ${JWT_SECRET:-change-me-to-random-jwt-secret}
      # AI - At least one required
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  logs:
